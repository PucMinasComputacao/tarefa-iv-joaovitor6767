<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Home Page</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<header class="topbar">

    <button>Cont.</button>

    <div class="videos">
